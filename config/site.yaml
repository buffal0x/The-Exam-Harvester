site:
  name: "NTI Studier"
  base_url: "https://studier.nti.se"
  login_url: "https://studier.nti.se"
  default_course_id: "3207194"

auth:
  username_env: "SCRAPER_USERNAME"
  password_env: "SCRAPER_PASSWORD"
  state_file: "data/auth/playwright_state.json"

selectors:
  inputs: ".tab-pane input.form-control"
  submit: ".tab-pane .col-xs-5 button"
  login_success: "small.student-id-presenter-in-summary"

crawler:
  denied_global_patterns:
    - "/logout"
    - "/profile"
    - "/settings"
    - "/calendar"

  denied_course_tabs:
    - "teacher"
    - "literature"
    - "lessons"
    - "news"

  blacklist_title_contains:
    - "Examination"
    - "Examination:"
    - "Delprov"
    - "Slutprov"
    - "Prov"

  blacklist_link_text_contains:
    - "Examination"
    - "Examination:"
    - "Delprov"
    - "Slutprov"
    - "Prov"
    - "Deadline"
    - "Skrivtid"
    - "Försenad"

  blacklist_page_text_contains:
    - "Deadline"
    - "Skrivtid"
    - "Försenad"
    - "Ej påbörjad"

  allowed_start_title_contains:
    - "Repetera"
    - "Öva"
    - "Obligatorisk uppgift"
    - "Information"
    - "Hur går det"

  start_button_selector: ".exam-start-buttons button.btn-primary"
  start_form_selector: "form.exam-start-buttons"
  submit_blocklist_text_contains:
    - "Lämna in uppgift"

storage:
  base_dir: "data/courses"
